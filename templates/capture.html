<!DOCTYPE html>
<html>
<head>
<title>Capture</title>
<link rel="stylesheet" href="/static/css/style.css">

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body {
height: 100vh;
background: url("/static/images/skin-bg.png") no-repeat center center fixed;
background-size: cover;
display: flex;
justify-content: center;
align-items: center;
position: relative;
}

/* GLASS OVERLAY */
body::before {
content: "";
position: absolute;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
z-index: 0;
}

/* LOGO */
.logo {
position: absolute;
top: 20px;
left: 30px;
color: white;
font-size: 24px;
font-weight: 600;
z-index: 2;
}

/* CARD */
.camera-card {
background: rgba(255,255,255,0.08);
backdrop-filter: blur(20px);
padding: 25px;
border-radius: 20px;
width: 380px;
text-align: center;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
color: white;
z-index: 2;
}

/* TITLE */
h2 {
margin-bottom: 10px;
color: white;
}

/* VIDEO */
.video-wrapper {
position: relative;
width: 100%;
height: 260px;
overflow: hidden;
border-radius: 15px;
}

video {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 15px;
}

.overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.25);
border-radius: 15px;
pointer-events: none;
}

.circle {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 180px;
height: 240px;
border-radius: 50% / 60%;
border: 3px solid rgba(255,255,255,0.9);
box-shadow: 0 0 20px rgba(255,255,255,0.7);
pointer-events: none;
}

/* BUTTON */
button {
margin-top: 15px;
width: 100%;
padding: 12px;
border: none;
border-radius: 12px;
background: linear-gradient(135deg, #ff4d6d, #ff758f);
color: white;
font-size: 16px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
transform: scale(1.03);
}

.cancel-btn {
background: rgba(255,255,255,0.2);
}

/* 🔥 PREMIUM LOADING SCREEN */
#loadingScreen {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: radial-gradient(circle at 30% 30%, #1a2a3a, #05080f 70%);
z-index: 999999;
align-items: center;
justify-content: center;
overflow: hidden;
}

/* GLOW EFFECT */
#loadingScreen::before {
content: "";
position: absolute;
width: 400px;
height: 400px;
background: radial-gradient(circle, rgba(255,77,109,0.25), transparent 70%);
top: 20%;
left: 30%;
filter: blur(80px);
animation: floatGlow 6s ease-in-out infinite;
}

#loadingScreen::after {
content: "";
position: absolute;
width: 300px;
height: 300px;
background: radial-gradient(circle, rgba(124,58,237,0.25), transparent 70%);
bottom: 15%;
right: 25%;
filter: blur(80px);
animation: floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow {
0% { transform: translateY(0px); }
50% { transform: translateY(-20px); }
100% { transform: translateY(0px); }
}

/* LOADING BOX */
.loading-box {
position: relative;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(25px);
padding: 50px;
border-radius: 28px;
text-align: center;
color: white;
box-shadow:
    0 30px 100px rgba(0,0,0,0.8),
    inset 0 1px 1px rgba(255,255,255,0.1);
}

/* PREMIUM SPINNER */
.spinner {
width: 90px;
height: 90px;
border-radius: 50%;
border: 6px solid rgba(255,255,255,0.15);

/* ✅ ONLY RED (NO PURPLE) */
border-top: 6px solid #ff4d6d;

animation: spin 1s linear infinite;
margin: 0 auto 25px;
box-shadow: 0 0 25px rgba(255,77,109,0.5);
}

@keyframes spin {
0%{ transform: rotate(0deg); }
100%{ transform: rotate(360deg); }
}

/* TEXT */
.loading-box h2 {
font-size: 22px;
margin-bottom: 10px;
}

.loading-box p {
opacity: 0.7;
}

/* DOTS */
.dots span {
display: inline-block;
width: 8px;
height: 8px;
margin: 0 4px;
background: #ff758f;
border-radius: 50%;
animation: bounce 1.4s infinite;
}

.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce {
0%,80%,100%{ transform: scale(0); }
40%{ transform: scale(1); }
}
</style>

</head>

<body>

<div class="logo">CharuFace</div>

<div class="camera-card">

<h2 id="stepTitle">Capture LEFT Face</h2>

<div class="video-wrapper">
<video id="video" autoplay playsinline></video>
<div class="overlay"></div>
<div class="circle"></div>
</div>

<button onclick="capture()">Capture</button>

<button class="cancel-btn" onclick="window.location.href='/details'">
Cancel
</button>

</div>

<!-- LOADING -->
<div id="loadingScreen">
    <div class="loading-box">
        <div class="spinner"></div>
        <h2>Analyzing your skin...</h2>
        <p>Generating AI skincare report</p>
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<script src="/static/js/camera.js"></script>

<script>
function showLoading(){
    const loader = document.getElementById("loadingScreen");
    if(loader){
        loader.style.display = "flex";
    }
}

function sendToBackend(images){

    let user = JSON.parse(localStorage.getItem("user_profile")) || {};
    const userEmail = localStorage.getItem("user_email");

    if(userEmail){
        user.email = userEmail;
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                user.location = {
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                };
                setTimeout(() => sendRequest(images, user), 200);
            },
            () => setTimeout(() => sendRequest(images, user), 200)
        );
    } else {
        setTimeout(() => sendRequest(images, user), 200);
    }
}

function sendRequest(images, user){
    fetch("http://127.0.0.1:8000/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ images, user_profile: user })
    })
    .then(res => res.json())
    .then(data => {
        if(!data || data.error){
            alert("Backend error: " + JSON.stringify(data));
            return;
        }
        localStorage.setItem("result", JSON.stringify(data));
        localStorage.setItem("hasAnalysis", "true");
        window.location.href = "/result";
    })
    .catch(() => alert("Request failed"));
}
</script>

</body>
</html>
