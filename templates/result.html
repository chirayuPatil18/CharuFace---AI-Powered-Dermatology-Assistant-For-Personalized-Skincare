<!DOCTYPE html>
<html>
<head>
<title>CharuFace Results</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', sans-serif;
}

/* 🌈 BACKGROUND */
body {
background: linear-gradient(135deg,#0f2027,#134e4a,#2c5364);
color: #ecfdf5;
padding: 30px;
}

/* 🔙 BACK BUTTON (NEW) */
.back-btn {
position: fixed;
top: 20px;
right: 25px;
background: rgba(255,255,255,0.1);
color: white;
border: 1px solid rgba(255,255,255,0.2);
padding: 10px 14px;
border-radius: 12px;
cursor: pointer;
font-size: 14px;
backdrop-filter: blur(10px);
transition: 0.3s;
z-index: 1000;
}

.back-btn:hover {
background: #f472b6;
}

/* LOGO */
.logo {
font-size: 30px;
font-weight: 700;
margin-bottom: 25px;
background: linear-gradient(135deg,#34d399,#f472b6);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

/* SECTION */
.section {
background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
padding: 22px;
border-radius: 18px;
margin-bottom: 20px;
backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.1);
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
transition: 0.3s;
}

.section:hover {
transform: translateY(-3px);
}

/* HEADINGS */
.section h2 { margin-bottom: 10px; }
.section h3 { margin-bottom: 10px; color: #a7f3d0; }

/* LIST */
ul {
margin-top: 10px;
padding-left: 18px;
}

li { margin-bottom: 6px; }

/* PRODUCTS TITLE */
.products-title {
margin: 30px 0 15px;
font-size: 24px;
font-weight: 600;
color: #f472b6;
}

/* PRODUCT CARD */
.product-card {
background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
border-radius: 18px;
padding: 18px;
margin-bottom: 15px;
border-left: 4px solid #f472b6;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
transition: 0.3s;
}

.product-card:hover {
transform: translateY(-4px) scale(1.01);
}

/* TEXT */
.product-card h3 {
margin-bottom: 6px;
font-size: 18px;
color: #ecfdf5;
}

.product-card p {
font-size: 14px;
color: #cbd5e1;
margin-bottom: 12px;
}

/* BUTTON GROUP */
.btn-group {
display: flex;
gap: 10px;
}

/* BUTTONS */
.product-card button {
flex: 1;
padding: 10px;
border-radius: 10px;
border: none;
cursor: pointer;
font-size: 14px;
transition: 0.3s;
}

/* AMAZON BUTTON */
.amazon-btn {
background: linear-gradient(135deg,#34d399,#10b981);
color: white;
}

.amazon-btn:hover {
opacity: 0.9;
}

/* WISHLIST BUTTON */
.wishlist-btn {
background: rgba(255,255,255,0.1);
color: #f472b6;
border: 1px solid rgba(255,255,255,0.2);
}

.wishlist-btn:hover {
background: #f472b6;
color: white;
}

/* CHAT FLOAT */
.chat-float {
position: fixed;
bottom: 25px;
right: 25px;
background: linear-gradient(135deg,#f472b6,#fb7185);
color: white;
padding: 16px;
border-radius: 50%;
cursor: pointer;
box-shadow: 0 10px 30px rgba(0,0,0,0.6);
transition: 0.3s;
}

.chat-float:hover {
transform: scale(1.1);
}
</style>

</head>

<body>

<!-- 🔙 BACK BUTTON (NEW) -->
<div class="back-btn" onclick="window.location='/details'">✖ Back</div>

<div class="logo">✨ CharuFace</div>
<div id="content"></div>

<div class="chat-float" onclick="window.location='/chat'">💬</div>

<script>

const data = JSON.parse(localStorage.getItem("result")) || {};
const rec = data.recommendation || {};
const container = document.getElementById("content");

/* TOP */
container.innerHTML += `
<div class="section">
<h2>${(data.issue || "").toUpperCase()} (${data.severity || "-"})</h2>
<p>Confidence: ${data.confidence || "-"}%</p>
<p>${rec.explanation || "No explanation available."}</p>
</div>
`;

/* INGREDIENTS */
container.innerHTML += `
<div class="section">
<h3>✨ Ingredients</h3>
<ul>${(rec.ingredients || []).map(i => `<li>${i}</li>`).join("")}</ul>
</div>
`;

/* AVOID */
container.innerHTML += `
<div class="section">
<h3>⚠️ Avoid</h3>
<ul>${(rec.avoid || []).map(i => `<li>${i}</li>`).join("")}</ul>
</div>
`;

/* ROUTINE */
container.innerHTML += `
<div class="section">
<h3>🧴 Routine</h3>
<b>Morning</b>
<ul>${(rec.routine?.morning || []).map(i => `<li>${i}</li>`).join("")}</ul>
<br>
<b>Night</b>
<ul>${(rec.routine?.night || []).map(i => `<li>${i}</li>`).join("")}</ul>
</div>
`;

/* DIET */
container.innerHTML += `
<div class="section">
<h3>🥗 Diet</h3>
<b>Eat</b>
<ul>${(rec.diet?.foods_to_eat || []).map(i => `<li>${i}</li>`).join("")}</ul>
<br>
<b>Avoid</b>
<ul>${(rec.diet?.foods_to_avoid || []).map(i => `<li>${i}</li>`).join("")}</ul>
</div>
`;

/* HOME REMEDIES */
container.innerHTML += `
<div class="section">
<h3>🏠 Home Remedies</h3>
<ul>${(rec.home_remedies || []).map(i => `<li>${i}</li>`).join("")}</ul>
</div>
`;

/* PRODUCTS */
container.innerHTML += `<h2 class="products-title">🛍 Recommended Products</h2>`;

if (rec.products?.length > 0) {

rec.products.forEach(p => {

const searchLink = `https://www.amazon.in/s?k=${encodeURIComponent(p.name + " skincare India")}`;

container.innerHTML += `
<div class="product-card">

<h3>${p.name}</h3>
<p>${p.reason || ""}</p>

<div class="btn-group">

<button class="amazon-btn"
onclick="window.open('${searchLink}', '_blank')">
View on Amazon
</button>

<button class="wishlist-btn"
onclick='saveWishlist(${JSON.stringify(p)})'>
❤️ Save
</button>

</div>

</div>
`;
});

} else {
container.innerHTML += `<p>No products available</p>`;
}

/* WISHLIST SAVE */
function saveWishlist(product){
let list = JSON.parse(localStorage.getItem("wishlist") || "[]");

if(!list.find(p => p.name === product.name)){
list.push(product);
localStorage.setItem("wishlist", JSON.stringify(list));
alert("Added to wishlist ❤️");
}
}

</script>

</body>
</html>
