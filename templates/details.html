<!DOCTYPE html>
<html>
<head>
<title>CharuFace - Details</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}

body{
background:linear-gradient(135deg,#0f2027,#1c3a44,#2c5364);
color:white;
padding:40px;
}

/* FORM */
.container{
max-width:520px;
margin:auto;
background:rgba(255,255,255,0.06);
padding:40px;
border-radius:24px;
backdrop-filter:blur(25px);
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.logo{font-size:26px;margin-bottom:20px;}

label{margin-top:15px;display:block;}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:none;
margin-top:6px;
background:rgba(255,255,255,0.15);
color:white;
}

input[type="number"] {
background: rgba(255,255,255,0.15);
color: white;

appearance: auto;
-webkit-appearance: auto;
-moz-appearance: auto;

outline: none;
box-shadow: none;
}

select option{
background:#1e2f38;
color:#fff;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
color:white;
cursor:pointer;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}
.actions button{
flex:1;
background:rgba(255,255,255,0.12);
}

.product-view{
display:none;
max-width:900px;
margin:30px auto;
}

.product-card{
background: rgba(255,255,255,0.05);
border-radius:18px;
padding:18px;
margin-bottom:15px;
border-left:4px solid #ff4d6d;
backdrop-filter: blur(15px);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-3px);
}

.product-card h3{
margin-bottom:6px;
font-size:18px;
}

.product-card p{
font-size:14px;
color:#cbd5e1;
margin-bottom:12px;
}

/* BUTTON */
.product-card button{
padding:10px 14px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
color:white;
cursor:pointer;
margin-top:6px;
}

/* REMOVE BUTTON */
.remove-btn{
background:#ef4444 !important;
}

/* BACK */
.back-btn{
margin-bottom:15px;
background:#333;
}

/* CHAT */
.chat-float{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="formSection">

<div class="logo">CharuFace</div>

<form id="userForm">

<label>Age</label>
<input name="age" type="number" min="15" max="50" required oninput="validateAge(this)">

<label>Skin Type</label>
<select name="skin_type" required>
<option value="">Select</option>
<option>Oily</option>
<option>Dry</option>
<option>Combination</option>
<option>Sensitive</option>
</select>

<label>Skin Allergy</label>
<select id="allergySelect" name="allergies" onchange="handleAllergy()" required>
<option value="">Select</option>
<option value="None">None</option>
<option value="Fragrance">Fragrance</option>
<option value="Alcohol">Alcohol</option>
<option value="Parabens">Parabens</option>
<option value="Sulfates">Sulfates</option>
<option value="Essential Oils">Essential Oils</option>
<option value="Silicones">Silicones</option>
<option value="Custom">Other</option>
</select>

<input id="customAllergy" style="display:none;">

<label>Concern</label>
<select name="concern" required>
<option value="">Select</option>
<option value="acne">Acne</option>
<option value="blackheads">Blackheads</option>
<option value="dryness">Dryness</option>
<option value="hyperpigmentation">Hyperpigmentation</option>
<option value="redness">Redness</option>
<option value="enlarged_pores">Enlarged Pores</option>
</select>

<button type="submit">Continue →</button>

</form>

<div class="actions">
<button onclick="showWishlist()">❤️ Wishlist</button>
<button onclick="showPrevious()">🧠 Previous</button>
</div>

</div>

<div class="product-view" id="productView">
<button class="back-btn" onclick="goBack()">← Back</button>
<div id="productsContainer"></div>
</div>

<div class="chat-float" onclick="window.location='/chat'">💬</div>

<script>

/* AGE */
function validateAge(input){
let value = parseInt(input.value);
if(value < 15){ input.value = 15; }
if(value > 50){ input.value = 50; }
}

/* FORM */
function handleAllergy(){
const select=document.getElementById("allergySelect");
const custom=document.getElementById("customAllergy");
custom.style.display = select.value==="Custom" ? "block" : "none";
}

document.getElementById("userForm").addEventListener("submit",function(e){
e.preventDefault();

let data=Object.fromEntries(new FormData(this).entries());

const age = parseInt(data.age);
if(age < 15 || age > 50){
alert("Age must be between 15 and 50");
return;
}

if(data.allergies==="Custom"){
data.allergies=document.getElementById("customAllergy").value;
}

localStorage.setItem("user_profile",JSON.stringify(data));
window.location.href="/capture";
});

/* NAV */
function goBack(){
formSection.style.display="block";
productView.style.display="none";
}

/* REMOVE */
function removeFromWishlist(name){
let list = JSON.parse(localStorage.getItem("wishlist") || "[]");

list = list.filter(item=>{
if(typeof item === "object"){
return item.name !== name;
}
return item !== name;
});

localStorage.setItem("wishlist", JSON.stringify(list));
showWishlist();
}

/* WISHLIST */
function showWishlist(){
let list = JSON.parse(localStorage.getItem("wishlist") || "[]");
const result = JSON.parse(localStorage.getItem("result"));

list = list.map(item=>{
if(typeof item === "object") return item;

if(result && result.recommendation){
let found = result.recommendation.products.find(p => p.name === item);
if(found) return found;
}

return {
name:item,
reason:"Saved item"
};
});

renderProducts(list, true);
}

/* PREVIOUS */
function showPrevious(){
const result=JSON.parse(localStorage.getItem("result"));
if(!result){alert("No previous data");return;}
renderProducts(result.recommendation.products, false);
}

/* RENDER (UPDATED UI) */
function renderProducts(products, isWishlist=false){

formSection.style.display="none";
productView.style.display="block";

const container=document.getElementById("productsContainer");
container.innerHTML="";

products.forEach(item=>{

const link = `https://www.amazon.in/s?k=${encodeURIComponent(item.name)}`;

container.innerHTML+=`
<div class="product-card">

<h3>${item.name}</h3>
<p>${item.reason || "Recommended product"}</p>

<button onclick="window.open('${link}','_blank')">
View on Amazon
</button>

${isWishlist ? `<button class="remove-btn" onclick="removeFromWishlist('${item.name}')">❌ Remove</button>` : ""}

</div>`;
});
}
</script>

</body>
</html>
