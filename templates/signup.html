<!DOCTYPE html>
<html>
<head>
<title>CharuFace AI - Signup</title>

<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Segoe UI', sans-serif;
}

body {
height: 100vh;
display: flex;
background: #f9f6f4;
}

.container {
display: flex;
width: 100%;
height: 100%;
}

/* LEFT SIDE */
.left {
flex: 1;
display: flex;
justify-content: center;
align-items: center;
padding: 60px;
}

.form-box {
width: 100%;
max-width: 360px;
}

.logo {
font-size: 26px;
font-weight: 600;
letter-spacing: 1px;
margin-bottom: 40px;
color: #2c2c2c;
}

h2 {
font-size: 32px;
margin-bottom: 10px;
color: #1a1a1a;
}

.subtitle {
color: #777;
margin-bottom: 30px;
font-size: 15px;
}

input {
width: 100%;
padding: 14px;
margin-bottom: 15px;
border-radius: 12px;
border: 1px solid #e0e0e0;
font-size: 14px;
background: #fafafa;
}

input:focus {
outline: none;
border-color: #d4a5a5;
background: white;
}

/* EMAIL GROUP */
.input-group {
display: flex;
gap: 10px;
margin-bottom: 15px;
}

.input-group input {
flex: 1;
margin-bottom: 0;
}

.verify-btn {
width: auto;
border-radius: 12px;
background: linear-gradient(135deg,#4f46e5,#7c3aed);
color: white;
font-size: 13px;
cursor: pointer;
border: none;
padding: 0 12px;
}

.verify-btn:hover {
opacity: 0.9;
}

/* BUTTON */
button {
width: 100%;
padding: 14px;
border-radius: 14px;
border: none;
background: #1a1a1a;
color: white;
font-size: 15px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #333;
}

.login {
text-align: center;
margin-top: 20px;
font-size: 14px;
color: #666;
}

.login a {
color: #1a1a1a;
font-weight: 600;
text-decoration: none;
}

/* ABOUT */
.about {
margin-top: 30px;
font-size: 13px;
color: #888;
text-align: center;
line-height: 1.5;
}

/* RIGHT */
.right {
flex: 1;
background: url("https://images.unsplash.com/photo-1607746882042-944635dfe10e") no-repeat center;
background-size: cover;
position: relative;
}

.right::after {
content: "";
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(
    to top,
    rgba(0,0,0,0.5),
    rgba(0,0,0,0.1)
);
}

.overlay-text {
position: absolute;
bottom: 50px;
left: 40px;
color: white;
z-index: 2;
max-width: 320px;
}

.overlay-text h3 {
font-size: 30px;
margin-bottom: 10px;
}

.overlay-text p {
font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
.right { display: none; }
.left { flex: 1; }
}
</style>

</head>

<body>

<div class="container">

<div class="left">
<div class="form-box">

<div class="logo">CharuFace</div>

<h2>Create account</h2>
<p class="subtitle">Start your personalized skincare journey</p>

<input id="name" placeholder="Name">

<div class="input-group">
<input id="email" placeholder="Email">
<button class="verify-btn" onclick="verifyEmail()">Verify</button>
</div>

<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Sign up</button>

<div class="login">
Already have an account? <a href="/">Sign in</a>
</div>

<div class="about">
Join CharuFace and discover personalized skincare recommendations powered by AI.
</div>

</div>
</div>

<div class="right">
<div class="overlay-text">
<h3>Glow starts with understanding your skin.</h3>
<p>AI-powered care tailored just for you.</p>
</div>
</div>

</div>

<script>

let isVerified = false;
let currentOTP = null;

/* 🔥 VERIFY EMAIL WITH OTP */
function verifyEmail(){

const email = document.getElementById("email").value;

if(!email || !email.includes("@")){
alert("Enter valid email");
return;
}

// Step 1: send OTP
fetch("/send-otp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})
})
.then(res=>res.json())
.then(data=>{

if(!data.success){
alert("Failed to send OTP");
return;
}

// Step 2: ask OTP
const otp = prompt("Enter OTP sent to your email");

// Step 3: verify OTP
fetch("/verify-otp",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email, otp})
})
.then(res=>res.json())
.then(result=>{
if(result.success){
alert("Email verified ✅");
isVerified = true;
}else{
alert(result.message);
}
});

});
}

/* 🔥 SIGNUP */
function signup(){

if(!isVerified){
alert("Please verify your email first");
return;
}

fetch("/signup",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
password:document.getElementById("pass").value
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);  // will show "User already exists"
if(data.success){
window.location="/";
}
})
}
</script>

</body>
</html>
